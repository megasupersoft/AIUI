services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /mnt/pool_01:/mnt/pool_01
      - ./server/uploads:/app/uploads
    extra_hosts:
      - "skeletor:host-gateway"
      - "comfyui.skeletor:host-gateway"
    networks:
      - aiui

  web:
    build:
      context: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - aiui

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    dns:
      - 127.0.0.11
    networks:
      - aiui

networks:
  aiui:
    driver: bridge
